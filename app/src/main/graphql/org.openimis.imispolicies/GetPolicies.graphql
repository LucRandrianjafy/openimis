query GetPolicies($familyUuid: String!){
    policiesByFamily(activeOrLastExpiredOnly: true, familyUuid: $familyUuid){
        edges {
            node{
                policyId
                policyUuid
                productCode
                productName
                officerCode
                enrollDate
                effectiveDate
                startDate
                expiryDate
                status
                policyValue
                contributionPlanCode
                contributionPlanName
                periodicity
                signatureDate
                paymentDay
            }
        }
    }
}