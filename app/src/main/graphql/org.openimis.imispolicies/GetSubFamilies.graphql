query GetSubFamilies($familyUuid: String) {
    families(parent_Uuid: $familyUuid) {
        edges {
            node {
                id
                uuid
                headInsuree {
                    chfId
                    uuid
                    phone
                }
                location {
                    legacyId
                    id
                    uuid
                }
                poverty
                familyType {
                    code
                }
                address
                ethnicity
                confirmationNo
                confirmationType {
                    code
                }
                isOffline
                members(validityTo_Isnull:true) {
                    edges {
                        node {
                            id
                            chfId
                            uuid
                            phone
                            head
                            passport
                            lastName
                            otherNames
                            dob
                            gender {
                                code
                            }
                            marital
                            cardIssued
                            relationship {
                                id
                                altLanguage
                            }
                            profession {
                                id
                                altLanguage
                            }
                            education {
                                id
                                altLanguage
                            }
                            email
                            typeOfId {
                                code
                                altLanguage
                            }
                            healthFacility {
                                id
                                uuid
                                legacyId
                            }
                            currentAddress
                            geolocation
                            currentVillage {
                                id
                            }
                            photo {
                                photo
                                filename
                                folder
                            }
                            offline
                            incomeLevel {
                                id
                            }
                            professionalSituation
                            preferredPaymentMethod
                            bankCoordinates
                            coordinates
                        }
                    }
                }
                parent{
                    uuid
                    id
                }
                attachments{
                    idAttachment,
                    filename,
                    document,
                    title,
                    date,
                    mime
                }
            }
        }
    }
}
